# Local development database. `docker compose up -d` and you have Postgres 16.
# Data persists in a named volume across restarts; `docker compose down -v` wipes it.
services:
  db:
    image: postgres:16-alpine
    container_name: ever-after-db
    environment:
      POSTGRES_USER: ever_after
      POSTGRES_PASSWORD: ever_after_dev # local dev only — real secrets never live in the repo
      POSTGRES_DB: ever_after
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ever_after -d ever_after']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
