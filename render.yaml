# Render Blueprint for the demo API — see docs/deploying-the-demo.md for
# the full walkthrough (this alone doesn't set up the frontend or database,
# just automates the Render half of it). Not used for local dev at all.
#
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: ever-after-demo-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEMO_MODE
        value: 'true'
      - key: SESSION_TTL_DAYS
        value: '30'
      # Secrets — not stored in the repo. Render will prompt for these when
      # you apply the blueprint; see docs/deploying-the-demo.md for where
      # each value comes from (Neon connection string, Vercel URL).
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
